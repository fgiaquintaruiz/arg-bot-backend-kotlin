server:
  port: 10007

spring:
  application:
    name: arg-bot-backend
  datasource:
    url: jdbc:h2:file:./data/argbot;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

crypto:
  encryption-key: ${ENCRYPTION_KEY:dev-key-replace-in-prod}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      binance:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
      criptoya:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2

vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}
  subject: ${VAPID_SUBJECT:mailto:fgiaquintaruiz@gmail.com}

binance:
  api-key: ${BINANCE_API_KEY:}
  api-secret: ${BINANCE_API_SECRET:}
  deposit:
    notify:
      threshold: ${BINANCE_DEPOSIT_NOTIFY_THRESHOLD:1.0}
