name: Keepalive — ping Render backend

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render /api/health
        run: |
          curl --fail --silent --show-error \
               --retry 3 --retry-delay 10 \
               --max-time 180 \
               https://arg-bot-backend-kotlin.onrender.com/api/health
          echo "OK"
